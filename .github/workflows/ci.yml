name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # Postgres for the database-backed lessons (lesson 26 onward). Lessons
    # without an Ecto Repo never connect to it. The generated config/test.exs
    # expects postgres/postgres on localhost:5432.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      # Install Hex + Rebar fresh for the active OTP. The precompiled Hex
      # archive is OTP-major specific; a build cached under an older OTP
      # fails to load (e.g. "module Hex.Repo ... does not exist" on OTP 29).
      # Always (re)install so they match the toolchain pinned in
      # .tool-versions, independent of any restored cache.
      - name: Install Hex + Rebar for the active OTP
        run: |
          mix local.hex --force
          mix local.rebar --force

      # Cache only the Hex package registry + tarballs (~/.hex), which are
      # OTP-independent. Do NOT cache ~/.mix — it holds the compiled Hex/Rebar
      # archives, which must not be shared across OTP majors.
      - name: Cache Hex registry + package tarballs
        uses: actions/cache@v5
        with:
          path: ~/.hex
          key: ${{ runner.os }}-hex-${{ hashFiles('.tool-versions') }}
          restore-keys: ${{ runner.os }}-hex-

      - name: Harness self-tests (tooling smoke)
        run: make ci-smoke

      - name: Lint (mix format + credo)
        run: make lint

      - name: Run lesson exercise tests
        run: make test

      - name: Run lesson solution tests
        run: make solutions-test

      - name: Build static slides site
        run: make slides-build

      - name: Verify dist contents
        run: |
          test -f dist/index.html
          grep -q "Elixir Training" dist/index.html
